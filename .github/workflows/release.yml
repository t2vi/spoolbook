name: Release builds

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - rid: win-x64
            runner: ubuntu-latest
          - rid: linux-x64
            runner: ubuntu-latest
          - rid: osx-x64
            runner: macos-latest
          - rid: osx-arm64
            runner: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Publish (macOS .app bundle)
        if: startsWith(matrix.rid, 'osx-')
        run: scripts/build-mac-app.sh ${{ matrix.rid }}

      - name: Zip (macOS .app bundle)
        if: startsWith(matrix.rid, 'osx-')
        run: |
          cd dist
          zip -r ../Spoolbook-${{ matrix.rid }}.zip Spoolbook.app

      - name: Publish
        if: "!startsWith(matrix.rid, 'osx-')"
        run: |
          dotnet publish Spoolbook.Desktop/Spoolbook.Desktop.csproj \
            -c Release -r ${{ matrix.rid }} --self-contained true \
            -p:PublishSingleFile=true \
            -o out/${{ matrix.rid }}

      - name: Zip
        if: "!startsWith(matrix.rid, 'osx-')"
        run: |
          cd out/${{ matrix.rid }}
          zip -r ../../Spoolbook-${{ matrix.rid }}.zip .

      - name: Upload to release
        run: gh release upload "${{ github.event.release.tag_name }}" "Spoolbook-${{ matrix.rid }}.zip"
        env:
          GH_TOKEN: ${{ github.token }}
